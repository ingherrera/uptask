server {
    listen 80;
    server_name _;

    # Frontend: Ahora la ruta es INTERNA al contenedor
    location / {
        # Esta ruta debe coincidir con el destino en tu docker-compose
        root /usr/share/nginx/html; 
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend: Cambiamos localhost por el nombre del servicio
    location /api/ {
        # 'backend' es el nombre que pusiste en el docker-compose.yml
        proxy_pass http://backend:4000; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}